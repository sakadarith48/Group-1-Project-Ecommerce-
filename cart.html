<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | Shopper</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav>

        <div class="logo">
            <i class="fa-solid fa-bag-shopping"></i> Shopper
        </div>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="product.html">Products</a></li>
            <li><a href="aboutus.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="cart.html">Cart</a></li>
        </ul>

    </nav>

    <!-- CART SECTION -->
    <section class="cart">

        <h2 class="cart-title">Your Shopping Cart</h2>

        <div class="cart-container">

            <!-- TABLE HEADER -->
            <div class="cart-header">
                <p>Product</p>
                <p>Price</p>
                <p>Quantity</p>
                <p>Total</p>
            </div>

            <!-- ITEM 1 -->
            <div class="cart-item">

                <div class="product">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSsuHAJCW-qz5sZZQS8fORe9zNEXzjZm9WTJerrJwOx1A&s=10">
                    <span>Headphones</span>
                </div>

                <p>$49.99</p>

                <p>1</p>

                <p>$49.99</p>

            </div>

            <!-- ITEM 2 -->
            <div class="cart-item">

                <div class="product">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT4PmIxa-Z7x1Q9ucFKqgunnBxq3MS4-trH1ZdP14r3lw&s=10">
                    <span>Smart Watch</span>
                </div>

                <p>$79.99</p>

                <p>1</p>

                <p>$79.99</p>

            </div>

            <!-- ITEM 3 -->
            <div class="cart-item">

                <div class="product">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTiok6OZFX7mV6HgCt-9D1-8nX2x9h14UGo3W_puItNoA&s=10">
                    <span>Shoes</span>
                </div>

                <p>$59.99</p>

                <p>1</p>

                <p>$59.99</p>

            </div>

        </div>

        <!-- SUMMARY -->
        <div class="cart-summary">

            <h3>Total: $189.97</h3>

            <div class="cart-buttons">
                <a href="index.html"><button class="btn-continue">Continue Shopping</button></a>
                <button class="btn-checkout">Checkout</button>
            </div>

        </div>

    </section>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 Shopper | All Rights Reserved</p>
    </footer>

</body>

</html>
