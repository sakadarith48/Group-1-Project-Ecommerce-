<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About Us</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

/* Navbar */

nav{
    background:#111;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 60px;
}

.logo{
    color:white;
    font-size:30px;
    font-weight:bold;
}

nav ul{
    list-style:none;
    display:flex;
}

nav ul li{
    margin-left:35px;
}

nav ul li a{
    color:white;
    text-decoration:none;
    transition:.3s;
}

nav ul li a:hover{
    color:gold;
}

/* Hero */

.hero{
    height:350px;
    background:url("https://i.pinimg.com/1200x/ce/fa/bb/cefabbcebea8d7e10f383ba5fd81ec98.jpg") center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.hero::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.5);
}

.hero-text{
    position:relative;
    color:white;
    text-align:center;
}

.hero-text h1{
    font-size:55px;
}

.hero-text p{
    margin-top:10px;
    font-size:20px;
}

/* Logo Section */

.company{
    background:white;
    text-align:center;
    padding:60px 20px;
}

.company img{
    width:130px;
    height:130px;
    border-radius:50%;
}

.company h2{
    margin-top:20px;
    font-size:35px;
}

.company p{
    margin-top:15px;
    color:#666;
    max-width:700px;
    margin-left:auto;
    margin-right:auto;
    line-height:1.8;
}

/* Team */

.team{
    padding:60px 8%;
}

.team h2{
    text-align:center;
    margin-bottom:40px;
    font-size:40px;
}

.team-container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:30px;
}

.card{
    width:220px;
    background:white;
    border-radius:10px;
    overflow:hidden;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card h3{
    margin:15px 0 5px;
}

.card p{
    color:gray;
    margin-bottom:20px;
}

footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:50px;
}

@media(max-width:768px){

nav{
    flex-direction:column;
}

nav ul{
    margin-top:15px;
}

.hero-text h1{
    font-size:40px;
}

}

</style>

</head>
<body>
